
name: Update citations from ORCID

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"  # 매주 1회 자동 실행

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch ORCID data
        run: |
          curl -H "Accept: application/json" \
          https://pub.orcid.org/v3.0/0000-0002-9526-9891/works \
          -o works.json

      - name: Convert to YAML
        run: |
          python3 <<EOF
          import json, yaml

          with open("works.json") as f:
              data = json.load(f)

          papers = []
          for g in data.get("group", []):
              work = g["work-summary"][0]

              title = work.get("title", {}).get("title", {}).get("value", "")
              year = work.get("publication-date", {}).get("year", {}).get("value", "")
              doi = ""

              for ext in work.get("external-ids", {}).get("external-id", []):
                  if ext.get("external-id-type") == "doi":
                      doi = ext.get("external-id-value")

              papers.append({
                  "title": title,
                  "date": f"{year}-01-01" if year else "",
                  "link": f"https://doi.org/{doi}" if doi else ""
              })

          with open("_data/citations.yaml", "w") as f:
              yaml.dump(papers, f, sort_keys=False)
          EOF

      - name: Commit changes
        run: |
          git config user.name "Jumee Kim"
          git config user.email "jumee@sookmyung.ac.kr"
          git add _data/citations.yaml
          git commit -m "Update citations from ORCID" || echo "No changes"
          git push